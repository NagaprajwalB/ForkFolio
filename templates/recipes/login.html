{% extends 'recipes/base.html' %}
{% block title %}Login — ForkFolio{% endblock %}
{% block content %}
<div style="max-width:440px; margin:4rem auto; padding:0 2rem;">
    <div style="background:white; border-radius:16px; padding:2.5rem; box-shadow:var(--shadow);">
        <h1 style="font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; margin-bottom:0.5rem;">Welcome back</h1>
        <p style="color:var(--mid-gray); margin-bottom:2rem; font-size:0.9rem;">Log in to share and discover recipes</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Log In</button>
        </form>
        <p style="margin-top:1.5rem; text-align:center; font-size:0.9rem; color:var(--mid-gray);">
            Don't have an account? <a href="{% url 'register' %}" style="color:var(--terracotta); font-weight:600;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
